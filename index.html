<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Veille Environnementale — GSF</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Azeret+Mono:wght@300;400;500;600&family=Epilogue:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
:root {
  --bg:        #07090d;
  --surface:   #0d1118;
  --surface2:  #131a24;
  --surface3:  #1a2332;
  --border:    #1e2d3d;
  --border2:   #243347;
  --text:      #d4e0ed;
  --muted:     #5a7491;
  --muted2:    #3d5470;
  --accent:    #3bff8a;
  --accent-dim:#0d3320;
  --crit1:     #4a90d9;
  --crit2:     #ffaa2e;
  --crit3:     #ff4545;
  --eau0:      #2e4a2e;
  --eau1:      #8bc34a;
  --eau2:      #ffd740;
  --eau3:      #ff9800;
  --eau4:      #f44336;
  --sidebar-w: 260px;
  --header-h:  56px;
  --radius:    6px;
  --mono: 'Azeret Mono', monospace;
  --sans: 'Epilogue', sans-serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  font-size: 13px;
  line-height: 1.5;
  overflow: hidden;
}

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

/* ── HEADER ── */
#header {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  height: var(--header-h);
  display: flex; align-items: center; gap: 16px;
  padding: 0 20px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
}
.hdr-logo {
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: var(--accent);
  display: flex; align-items: center; gap: 8px;
}
.hdr-logo::before {
  content:'';
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--accent);
  box-shadow: 0 0 10px var(--accent);
  animation: pulse 2.5s ease-in-out infinite;
}
@keyframes pulse {
  0%,100% { opacity:1; transform:scale(1); }
  50%      { opacity:.4; transform:scale(.8); }
}
.hdr-title {
  font-weight: 500;
  font-size: 14px;
  color: var(--text);
  flex: 1;
}
.hdr-date {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--muted);
  letter-spacing: .05em;
}
#hdr-status {
  font-family: var(--mono);
  font-size: 10px;
  font-weight: 500;
  letter-spacing: .1em;
  padding: 3px 10px;
  border-radius: 20px;
  background: var(--accent-dim);
  color: var(--accent);
  border: 1px solid rgba(59,255,138,.2);
  transition: all .3s;
}
#hdr-status.err { background:#2a0a0a; color:#ff4545; border-color:rgba(255,69,69,.2); }
#hdr-status.loading { color: var(--muted); background: var(--surface2); border-color: var(--border); }

/* ── LAYOUT ── */
#layout {
  display: flex;
  height: 100vh;
  padding-top: var(--header-h);
}

/* ── SIDEBAR ── */
#sidebar {
  width: var(--sidebar-w);
  flex-shrink: 0;
  height: 100%;
  overflow-y: auto;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  padding: 16px 0;
}
.s-section { padding: 0 16px 12px; }
.s-label {
  font-family: var(--mono);
  font-size: 9px;
  font-weight: 600;
  letter-spacing: .15em;
  text-transform: uppercase;
  color: var(--muted2);
  margin-bottom: 8px;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--border);
}

/* Nav */
.nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 10px;
  border-radius: var(--radius);
  cursor: pointer;
  font-size: 13px;
  font-weight: 500;
  color: var(--muted);
  transition: all .15s;
  margin-bottom: 2px;
}
.nav-item:hover { background: var(--surface2); color: var(--text); }
.nav-item.active {
  background: var(--accent-dim);
  color: var(--accent);
  border: 1px solid rgba(59,255,138,.15);
}
.nav-icon { font-size: 14px; width: 18px; text-align: center; }

/* Filters */
.filter-row {
  display: flex; align-items: center; gap: 8px;
  padding: 5px 0;
  cursor: pointer;
  user-select: none;
}
.filter-row input[type=checkbox] { display:none; }
.fcheck {
  width: 14px; height: 14px;
  border-radius: 3px;
  border: 1px solid var(--border2);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  font-size: 9px;
  transition: all .15s;
}
.filter-row.on .fcheck { background: var(--accent); border-color: var(--accent); color: #000; }
.filter-row:hover .fcheck { border-color: var(--accent); }
.filter-lbl { font-size: 12px; color: var(--text); }

/* Stats résumé */
.stat-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 5px 0;
  border-bottom: 1px solid var(--border);
}
.stat-lbl { font-size: 11px; color: var(--muted); }
.stat-val {
  font-family: var(--mono);
  font-size: 12px;
  font-weight: 500;
  color: var(--text);
}

/* Eau alert résumé */
.eau-chip {
  display: flex; align-items: center; gap: 6px;
  padding: 4px 8px;
  border-radius: var(--radius);
  font-size: 11px;
  margin-bottom: 4px;
}
.eau-dot { width: 7px; height: 7px; border-radius: 50%; }

/* ── MAIN CONTENT ── */
#main {
  flex: 1;
  height: 100%;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 20px;
  background: var(--bg);
}

/* ── VIEW SWITCHER ── */
.view { display: none; }
.view.active { display: block; }

/* ── FEED ── */
#feed-toolbar {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 16px;
  flex-wrap: wrap;
}
.feed-title {
  font-size: 20px;
  font-weight: 700;
  color: var(--text);
  flex: 1;
}
.badge-filter {
  font-family: var(--mono);
  font-size: 10px;
  padding: 4px 10px;
  border-radius: 20px;
  border: 1px solid var(--border2);
  color: var(--muted);
  cursor: pointer;
  transition: all .15s;
  background: transparent;
}
.badge-filter:hover,
.badge-filter.on { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }

#feed-list { display: flex; flex-direction: column; gap: 8px; }

/* Card */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  border-left: 3px solid var(--crit1);
  padding: 14px 16px;
  transition: transform .1s, border-color .1s;
  cursor: default;
}
.card:hover { transform: translateX(2px); border-color: var(--border2); }
.card[data-crit="2"] { border-left-color: var(--crit2); }
.card[data-crit="3"] { border-left-color: var(--crit3); }

.card-top {
  display: flex; align-items: flex-start; gap: 8px;
  margin-bottom: 6px;
}
.card-badge {
  font-family: var(--mono);
  font-size: 9px;
  font-weight: 600;
  letter-spacing: .1em;
  padding: 2px 7px;
  border-radius: 20px;
  flex-shrink: 0;
  margin-top: 2px;
}
.badge-ICPE        { background:#1a2a3a; color:#4aa0ff; }
.badge-Eau         { background:#0a2030; color:#40c4ff; }
.badge-Énergie     { background:#2a1a00; color:#ffb74d; }
.badge-Biodiversité{ background:#0a2010; color:#69f0ae; }
.badge-Déchets     { background:#1a1a0a; color:#e6ee9c; }
.badge-Émissions   { background:#1a0a2a; color:#ce93d8; }
.badge-Presse      { background:#1a1a1a; color:#90a4ae; }
.badge-Réglementation{ background:#1a2a1a; color:#a5d6a7; }
.badge-JO\/DILA    { background:#0d1a2a; color:#64b5f6; }
.badge-Environnement{ background:#131313; color:#78909c; }

.card-titre {
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
  line-height: 1.4;
  flex: 1;
}
.card-resume {
  font-size: 12px;
  color: var(--muted);
  line-height: 1.6;
  margin-bottom: 8px;
}
.card-footer {
  display: flex; align-items: center; gap: 12px;
  flex-wrap: wrap;
}
.card-source {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--muted2);
  letter-spacing: .05em;
}
.card-crit {
  font-family: var(--mono);
  font-size: 9px;
  padding: 1px 6px;
  border-radius: 20px;
}
.crit1 { background:#0d1a2a; color:var(--crit1); }
.crit2 { background:#2a1a00; color:var(--crit2); }
.crit3 { background:#2a0a0a; color:var(--crit3); }
.card-link {
  margin-left: auto;
  font-family: var(--mono);
  font-size: 10px;
  color: var(--accent);
  text-decoration: none;
  opacity: .7;
  transition: opacity .15s;
}
.card-link:hover { opacity: 1; }

.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--muted);
  font-size: 13px;
}
.empty-state::before {
  content: '◎';
  display: block;
  font-size: 32px;
  margin-bottom: 12px;
  opacity: .3;
}

/* ── CARTE ── */
#carte-view { height: calc(100vh - var(--header-h) - 40px); display: none; }
#carte-view.active { display: flex; flex-direction: column; }
#map-container {
  flex: 1;
  border-radius: 10px;
  border: 1px solid var(--border);
  overflow: hidden;
  min-height: 400px;
}
/* Dark tiles */
.leaflet-layer, .leaflet-control-zoom, .leaflet-bar { filter: none; }

#map-legend {
  display: flex; gap: 6px; flex-wrap: wrap;
  padding: 10px 0 8px;
  align-items: center;
}
.legend-title {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--muted);
  letter-spacing: .1em;
  margin-right: 4px;
}
.legend-chip {
  display: flex; align-items: center; gap: 5px;
  font-size: 11px;
  color: var(--text);
  padding: 3px 8px;
  border-radius: 20px;
  background: var(--surface2);
  border: 1px solid var(--border);
}
.legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

#dept-detail {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px 16px;
  margin-top: 8px;
  display: none;
}
#dept-detail.open { display: block; }
.dept-detail-title {
  font-weight: 600;
  font-size: 14px;
  margin-bottom: 6px;
  display: flex; align-items: center; gap: 8px;
}

/* ── ARCHIVES ── */
#archives-view { }
.arc-title {
  font-size: 20px;
  font-weight: 700;
  margin-bottom: 20px;
}
.arc-month { margin-bottom: 24px; }
.arc-month-title {
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 10px;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--border);
}
.arc-days { display: flex; flex-wrap: wrap; gap: 6px; }
.arc-day {
  font-family: var(--mono);
  font-size: 11px;
  padding: 6px 12px;
  border-radius: var(--radius);
  border: 1px solid var(--border);
  color: var(--muted2);
  cursor: default;
  transition: all .15s;
  min-width: 44px;
  text-align: center;
}
.arc-day.has-data {
  border-color: var(--border2);
  color: var(--text);
  cursor: pointer;
  background: var(--surface2);
}
.arc-day.has-data:hover { border-color: var(--accent); color: var(--accent); }
.arc-day.selected { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }
.arc-day.today { border-color: var(--crit1); color: var(--crit1); }

/* ── LOADING / TOAST ── */
#loading {
  position: fixed; inset: 0; z-index: 999;
  display: flex; align-items: center; justify-content: center;
  background: var(--bg);
  flex-direction: column; gap: 16px;
}
.loading-spinner {
  width: 32px; height: 32px;
  border: 2px solid var(--border2);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin .8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--muted);
  letter-spacing: .1em;
}

#toast {
  position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(8px);
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  padding: 8px 16px;
  font-size: 12px;
  font-family: var(--mono);
  opacity: 0;
  transition: all .2s;
  pointer-events: none;
  white-space: nowrap;
  z-index: 200;
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* Leaflet popup dark */
.leaflet-popup-content-wrapper {
  background: var(--surface2) !important;
  color: var(--text) !important;
  border: 1px solid var(--border2) !important;
  border-radius: var(--radius) !important;
  box-shadow: 0 4px 20px rgba(0,0,0,.5) !important;
}
.leaflet-popup-tip { background: var(--surface2) !important; }

/* ── TOP 5 URGENCES ── */
#top5-banner { background: var(--surface); border-bottom: 1px solid var(--border);
  padding: 10px 20px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
.top5-label { font-family: var(--mono); font-size: 9px; font-weight: 600;
  letter-spacing: .15em; color: var(--muted2); text-transform: uppercase;
  white-space: nowrap; }
.top5-pill { display: flex; align-items: center; gap: 6px; padding: 4px 10px;
  border-radius: 20px; border: 1px solid var(--border2); cursor: pointer;
  transition: all .15s; background: var(--surface2); max-width: 280px; }
.top5-pill:hover { border-color: var(--accent); }
.top5-pill-crit { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.top5-pill-text { font-size: 11px; color: var(--text); white-space: nowrap;
  overflow: hidden; text-overflow: ellipsis; }

/* ── DATE ARTICLE ── */
.card-date { font-family: var(--mono); font-size: 10px; color: var(--muted2);
  margin-left: auto; white-space: nowrap; }


/* ── ONGLET JO ── */
#jo-view { padding: 16px; overflow-y: auto; height: 100%; }
.jo-title { font-family: var(--mono); font-size: 11px; font-weight: 600;
  letter-spacing:.15em; text-transform:uppercase; color:var(--muted2);
  margin-bottom: 14px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
.jo-search { width: 100%; background: var(--surface2); border: 1px solid var(--border2);
  border-radius: var(--radius); padding: 6px 12px; color: var(--text); font-size: 12px;
  font-family: var(--sans); margin-bottom: 12px; outline: none; }
.jo-search:focus { border-color: var(--accent); }
.jo-theme-group { margin-bottom: 16px; }
.jo-theme-header { display: flex; align-items: center; gap: 8px; cursor: pointer;
  padding: 6px 0; border-bottom: 1px solid var(--border); margin-bottom: 4px; }
.jo-theme-name { font-size: 12px; font-weight: 500; color: var(--text); flex: 1; }
.jo-theme-count { font-family: var(--mono); font-size: 10px; color: var(--muted2);
  background: var(--surface2); padding: 1px 6px; border-radius: 10px; }
.jo-chevron { font-size: 10px; color: var(--muted2); transition: transform .2s; }
.jo-theme-group.open .jo-chevron { transform: rotate(90deg); }
.jo-items { display: none; flex-direction: column; gap: 6px; padding: 4px 0; }
.jo-theme-group.open .jo-items { display: flex; }
.jo-item { padding: 8px 10px; border-radius: var(--radius);
  background: var(--surface2); border: 1px solid var(--border);
  transition: border-color .15s; cursor: default; }
.jo-item:hover { border-color: var(--border2); }
.jo-item-nature { font-family: var(--mono); font-size: 9px; font-weight: 600;
  letter-spacing: .1em; text-transform: uppercase; color: var(--muted2); margin-bottom: 3px; }
.jo-item-titre { font-size: 11px; color: var(--text); line-height: 1.4; margin-bottom: 4px; }
.jo-item-link { font-family: var(--mono); font-size: 10px; color: var(--accent);
  text-decoration: none; }
.jo-item-link:hover { text-decoration: underline; }
.jo-empty { font-size: 12px; color: var(--muted); padding: 20px; text-align: center;
  font-family: var(--mono); }

/* ── COMPTEUR RESTRICTIONS ── */
.eau-counter { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }
.eau-count-chip { display: flex; align-items: center; gap: 4px; padding: 3px 8px;
  border-radius: 10px; font-family: var(--mono); font-size: 10px; }

</style>
</head>
<body>

<!-- LOADING -->
<div id="loading">
  <div class="loading-spinner"></div>
  <div class="loading-text">Chargement des données…</div>
</div>

<!-- HEADER -->
<div id="header">
  <div class="hdr-logo">GSF</div>
  <div class="hdr-title">Veille Environnementale</div>
  <div class="hdr-date" id="hdr-date">—</div>
  <div id="hdr-status" class="loading">CHARGEMENT</div>
</div>

<!-- LAYOUT -->
<div id="layout">

  <!-- SIDEBAR -->
  <div id="sidebar">

    <!-- Navigation -->
    <div class="s-section">
      <div class="s-label">Navigation</div>
      <div class="nav-item active" data-view="feed" onclick="switchView('feed')">
        <span class="nav-icon">◈</span> Feed
      </div>
      <div class="nav-item" data-view="carte" onclick="switchView('carte')">
        <span class="nav-icon">◉</span> Carte Eau
      </div>
      <div class="nav-item" data-view="archives" onclick="switchView('archives')">
        <span class="nav-icon">◷</span> Archives
      </div>
      <div class="nav-item" data-view="jo" onclick="switchView('jo')">
        <span class="nav-icon">⊞</span> JO / DILA
      </div>
    </div>

    <!-- Filtres -->
    <div class="s-section">
      <div class="s-label">Filtres sources</div>
      <label class="filter-row on" id="f-jorf">
        <input type="checkbox" checked onchange="toggleFilter('jorf',this.checked)">
        <div class="fcheck">✓</div>
        <span class="filter-lbl">JO / DILA</span>
      </label>
      <label class="filter-row on" id="f-presse">
        <input type="checkbox" checked onchange="toggleFilter('presse',this.checked)">
        <div class="fcheck">✓</div>
        <span class="filter-lbl">Presse spécialisée</span>
      </label>
      <label class="filter-row on" id="f-eau">
        <input type="checkbox" checked onchange="toggleFilter('eau',this.checked)">
        <div class="fcheck">✓</div>
        <span class="filter-lbl">Restrictions eau</span>
      </label>
    </div>

    <!-- Stats -->
    <div class="s-section">
      <div class="s-label">Résumé du jour</div>
      <div id="sidebar-stats"></div>
    </div>

    <!-- Alertes eau -->
    <div class="s-section">
      <div class="s-label">Alertes eau</div>
      <div id="eau-counter" class="eau-counter"></div>
      <div id="sidebar-eau"></div>
    </div>

  </div><!-- /sidebar -->

  <!-- MAIN -->
  <div id="main">

    <!-- FEED -->
    <div class="view active" id="feed-view">
      <div id="top5-banner"></div>
      <div id="feed-toolbar">
        <div class="feed-title" id="feed-titre">—</div>
        <button class="badge-filter on" data-cat="all" onclick="filterCat('all')">Tout</button>
        <button class="badge-filter" data-cat="ICPE" onclick="filterCat('ICPE')">ICPE</button>
        <button class="badge-filter" data-cat="Eau" onclick="filterCat('Eau')">Eau</button>
        <button class="badge-filter" data-cat="Énergie" onclick="filterCat('Énergie')">Énergie</button>
        <button class="badge-filter" data-cat="Biodiversité" onclick="filterCat('Biodiversité')">Biodiversité</button>
        <button class="badge-filter" data-cat="Déchets" onclick="filterCat('Déchets')">Déchets</button>
        <button class="badge-filter" data-cat="Presse" onclick="filterCat('Presse')">Presse</button>
      </div>
      <div id="feed-list"></div>
    </div>

    <!-- CARTE -->
    <div class="view" id="carte-view">
      <div id="map-legend">
        <span class="legend-title">RESTRICTIONS EAU —</span>
        <span class="legend-chip"><span class="legend-dot" style="background:#4caf50"></span>Aucune</span>
        <span class="legend-chip"><span class="legend-dot" style="background:#c6d848"></span>Vigilance</span>
        <span class="legend-chip"><span class="legend-dot" style="background:#ffd740"></span>Alerte</span>
        <span class="legend-chip"><span class="legend-dot" style="background:#ff9800"></span>Alerte renforcée</span>
        <span class="legend-chip"><span class="legend-dot" style="background:#f44336"></span>Crise</span>
      </div>
      <div id="map-container"></div>
      <div id="dept-detail"></div>
    </div>

    <!-- JO / DILA -->
    <div class="view" id="jo-view">
      <div class="jo-title">Journal Officiel — tous les textes analysés</div>
      <div id="jo-stats"></div>
      <input class="jo-search" id="jo-search" type="text" placeholder="Rechercher un arrêté, décret..." oninput="filterJO()">
      <div id="jo-groups"></div>
    </div>

    <!-- ARCHIVES -->
    <div class="view" id="archives-view">
      <div class="arc-title">Archives — 90 jours</div>
      <div id="arc-calendar"></div>
    </div>

  </div><!-- /main -->
</div><!-- /layout -->

<div id="toast"></div>

<script>
// ─────────────────────────────────────────
// STATE
// ─────────────────────────────────────────
let D          = null;
let archive    = null;
let currentDate = null;
let currentView = 'feed';
let catFilter   = 'all';
let srcFilters  = { jorf: true, presse: true, eau: true };
let map         = null;
let geojsonLayer = null;
let geojsonData  = null;

const JORF_SOURCES   = ['JORF', 'Légifrance RSS'];
const PRESSE_SOURCES = ['ADEME', 'Actu-Environnement', 'Min. Transition Écologique'];

function sourceType(src) {
  if (JORF_SOURCES.includes(src))   return 'jorf';
  if (PRESSE_SOURCES.includes(src)) return 'presse';
  return 'presse';
}

const NIVEAU_COLOR = {
  'vigilance':          '#c6d848',
  'alerte':             '#ffd740',
  'alerte_renforcee':   '#ff9800',
  'alerte renforcée':   '#ff9800',
  'alerte renforce':    '#ff9800',
  'crise':              '#f44336',
};
const NIVEAU_LABEL = {
  'vigilance':          'Vigilance',
  'alerte':             'Alerte',
  'alerte_renforcee':   'Alerte renforcée',
  'alerte renforcée':   'Alerte renforcée',
  'alerte renforce':    'Alerte renforcée',
  'crise':              '🔴 Crise',
};

// Normalise un niveau VigiEau (gère underscores, accents manquants)
function normalizeNiveau(raw) {
  if (!raw) return '';
  const s = raw.toLowerCase().trim()
    .replace(/_/g, ' ')
    .replace('renforcee', 'renforcée')
    .replace('renforcé', 'renforcée');
  return s;
}

// ─────────────────────────────────────────
// INIT
// ─────────────────────────────────────────
async function init() {
  try {
    archive = await loadArchive();
    if (archive?.dates?.length) {
      currentDate = archive.dates[0];
      D = await loadData(currentDate);
    }
    renderAll();
    document.getElementById('loading').style.display = 'none';
  } catch(e) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('hdr-status').textContent = 'ERREUR';
    document.getElementById('hdr-status').className = 'err';
    showToast('Impossible de charger les données');
    console.error(e);
  }
}

async function loadArchive() {
  const r = await fetch('archive.json');
  if (!r.ok) throw new Error('archive.json introuvable');
  return r.json();
}

async function loadData(date) {
  const r = await fetch(`data/${date}.json`);
  if (!r.ok) throw new Error(`Données introuvables : ${date}`);
  return r.json();
}

// ─────────────────────────────────────────
// RENDER ALL
// ─────────────────────────────────────────
function renderAll() {
  if (!D) return;

  // Header
  document.getElementById('hdr-date').textContent = formatDate(D.date) + ' — ' + D.generated_at;
  const hasErr = D.errors?.length > 0;
  const statusEl = document.getElementById('hdr-status');
  statusEl.textContent = hasErr ? 'PARTIEL' : 'OK';
  statusEl.className   = hasErr ? 'err' : '';

  renderSidebar();
  renderFeed();
  if (currentView === 'carte')    renderMap();
  if (currentView === 'archives') renderArchives();
}

// ─────────────────────────────────────────
// SIDEBAR
// ─────────────────────────────────────────
function renderSidebar() {
  const s = D.stats || {};
  const statsEl = document.getElementById('sidebar-stats');
  statsEl.innerHTML = [
    ['JO analysés',    s.jo_analyses     ?? '—'],
    ['JO retenus',     s.jo_retenus      ?? '—'],
    ['Articles presse',s.articles_presse ?? '—'],
    ['Depts alertés',  s.depts_restriction ?? '—'],
  ].map(([l,v]) => `
    <div class="stat-row">
      <span class="stat-lbl">${l}</span>
      <span class="stat-val">${v}</span>
    </div>`).join('');

  // Compteur restrictions par niveau
  const counterEl = document.getElementById('eau-counter');
  const restr = D.restrictions_eau || [];
  const counts = { vigilance: 0, alerte: 0, 'alerte renforcée': 0, crise: 0 };
  restr.forEach(r => { if (counts[r.niveau] !== undefined) counts[r.niveau]++; });
  counterEl.innerHTML = Object.entries(counts)
    .filter(([,v]) => v > 0)
    .map(([niv, nb]) => `
      <div class="eau-count-chip" style="background:${NIVEAU_COLOR[niv]}18;border:1px solid ${NIVEAU_COLOR[niv]}40">
        <span style="background:${NIVEAU_COLOR[niv]};width:6px;height:6px;border-radius:50%;display:inline-block"></span>
        <span style="color:${NIVEAU_COLOR[niv]}">${nb}</span>
        <span style="color:var(--muted2)">${niv}</span>
      </div>`).join('') || '<span style="font-size:11px;color:var(--muted)">Aucune restriction</span>';

  // Alertes eau résumé
  const eauEl = document.getElementById('sidebar-eau');
  const crises = restr.filter(r => r.niveau === 'crise');
  const alertes = restr.filter(r => r.niveau === 'alerte renforcée');
  if (!crises.length && !alertes.length) {
    eauEl.innerHTML = `<div style="font-size:11px;color:var(--muted)">Aucune alerte majeure</div>`;
  } else {
    eauEl.innerHTML = [...crises, ...alertes].slice(0, 5).map(r => `
      <div class="eau-chip" style="background:${NIVEAU_COLOR[r.niveau]}18;border:1px solid ${NIVEAU_COLOR[r.niveau]}40">
        <span class="eau-dot" style="background:${NIVEAU_COLOR[r.niveau]}"></span>
        <span style="color:var(--text);font-size:11px">${r.dept_nom} (${r.dept_code})</span>
      </div>`).join('');
  }
}

// ─────────────────────────────────────────
// FEED
// ─────────────────────────────────────────
function renderFeed() {
  // Top 5
  const top5 = (D.items || []).filter(i => i.top5).slice(0, 5);
  const banner = document.getElementById('top5-banner');
  if (top5.length) {
    const CRIT_COL = { 1: 'var(--crit1)', 2: 'var(--crit2)', 3: 'var(--crit3)' };
    banner.innerHTML = `<span class="top5-label">⚡ Top 5</span>` +
      top5.map(i => `
        <div class="top5-pill" onclick="scrollToItem('${i.id}')">
          <div class="top5-pill-crit" style="background:${CRIT_COL[i.criticite]||'var(--muted)'}"></div>
          <span class="top5-pill-text">${escHtml(i.titre)}</span>
        </div>`).join('');
    banner.style.display = 'flex';
  } else {
    banner.style.display = 'none';
  }

  document.getElementById('feed-titre').textContent =
    'Veille du ' + formatDate(D.date) + '  ·  ' + (D.items?.length || 0) + ' signaux';

  const items = getFilteredItems();
  const list  = document.getElementById('feed-list');

  if (!items.length) {
    list.innerHTML = `<div class="empty-state">Aucun résultat avec ces filtres</div>`;
    return;
  }

  list.innerHTML = items.map(item => `
    <div class="card" id="item-${item.id}" data-crit="${item.criticite}">
      <div class="card-top">
        <span class="card-badge badge-${escHtml(item.categorie)}">${escHtml(item.categorie)}</span>
        <div class="card-titre">${escHtml(item.titre)}</div>
        ${item.date ? `<span class="card-date">${formatDate(item.date)}</span>` : ''}
      </div>
      <div class="card-resume">${escHtml(item.resume)}</div>
      <div class="card-footer">
        <span class="card-source">${escHtml(item.source)}</span>
        <span class="card-crit crit${item.criticite}">${['','Info','Vigilance','⚠ Impact direct'][item.criticite] || 'Info'}</span>
        ${item.url ? `<a class="card-link" href="${escHtml(item.url)}" target="_blank" rel="noopener">Lire →</a>` : ''}
      </div>
    </div>`).join('');
}

function scrollToItem(id) {
  // S'assurer qu'on est sur le feed et que les items sont rendus
  if (currentView !== 'feed') switchView('feed');
  renderFeed();
  // Attendre que le DOM soit mis à jour
  setTimeout(() => {
    const el = document.getElementById('item-' + id);
    if (el) {
      el.scrollIntoView({ behavior: 'smooth', block: 'center' });
      el.style.transition = 'outline .1s, box-shadow .3s';
      el.style.outline = '2px solid var(--accent)';
      el.style.boxShadow = '0 0 16px rgba(59,255,138,.3)';
      setTimeout(() => {
        el.style.outline = '';
        el.style.boxShadow = '';
      }, 2000);
    } else {
      // Fallback : scroller en haut du feed
      document.getElementById('feed-list')?.scrollTo({top: 0, behavior: 'smooth'});
    }
  }, 150);
}

function getFilteredItems() {
  if (!D?.items) return [];

  return D.items.filter(item => {
    if (catFilter !== 'all' && item.categorie !== catFilter) return false;
    const stype = sourceType(item.source);
    if (stype === 'jorf'   && !srcFilters.jorf)   return false;
    if (stype === 'presse' && !srcFilters.presse)  return false;
    return true;
  });
}

function filterCat(cat) {
  catFilter = cat;
  document.querySelectorAll('.badge-filter').forEach(b => {
    b.classList.toggle('on', b.dataset.cat === cat);
  });
  renderFeed();
}

function toggleFilter(key, val) {
  srcFilters[key] = val;
  const row = document.getElementById(`f-${key}`);
  row?.classList.toggle('on', val);
  row?.querySelector('.fcheck') && (row.querySelector('.fcheck').textContent = val ? '✓' : '');
  renderFeed();
}

// ─────────────────────────────────────────
// CARTE
// ─────────────────────────────────────────
function renderMap() {
  if (!map) {
    map = L.map('map-container', {
      center: [46.4, 2.3],
      zoom: 5,
      zoomControl: true,
      attributionControl: false,
    });

    // Fond clair CartoDB Positron — meilleure lisibilité des zones colorées
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png', {
      maxZoom: 18,
    }).addTo(map);

    // Labels par-dessus
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_only_labels/{z}/{x}/{y}{r}.png', {
      maxZoom: 18,
      zIndex: 10,
    }).addTo(map);
  }

  // GeoJSON zones VigiEau (maille fine — même source que vigieau.gouv.fr)
  const VIGIEAU_GJ = 'https://regleau.s3.gra.perf.cloud.ovh.net/geojson/zones_arretes_en_vigueur.geojson';

  function getZoneColor(props) {
    const niv = normalizeNiveau(props.niveauGravite || props.niveauGraviteMax || props.niveau || props.statut || '');
    return NIVEAU_COLOR[niv] || '#2e4a2e';
  }
  function styleZone(feature) {
    return { fillColor: getZoneColor(feature.properties), fillOpacity: 0.65,
             color: '#07090d', weight: 0.5, opacity: 0.8 };
  }
  function onEachZone(feature, layer) {
    const p = feature.properties;
    // Propriétés exactes du GeoJSON VigiEau (source: github.com/MTES-MCT/vigieau-api)
    // niveauGravite utilise des underscores: "alerte_renforcee", "crise", "alerte", "vigilance"
    const nivRaw = p.niveauGravite || p.niveauGraviteMax || p.niveau || p.statut || '';
    const niv = normalizeNiveau(nivRaw);
    const nom = p.nom || p.nomZone || p.libelle || 'Zone';
    const dep = p.departement || p.nomDepartement || '';
    const type = p.type || '';  // SUP, SOU, AEP
    const typeLabel = { SUP: 'Eau superficielle', SOU: 'Eau souterraine', AEP: 'Eau potable' }[type] || type;
    // Lien arrêté : peut être direct ou imbriqué dans p.arrete.cheminFichier
    const arrete = (p.arrete && p.arrete.cheminFichier)
      || p.cheminFichier || p.chemin_fichier || p.urlArrete || '';
    const col = NIVEAU_COLOR[niv] || '#2e7d32';
    const lbl = NIVEAU_LABEL[niv] || (niv ? niv.charAt(0).toUpperCase() + niv.slice(1) : 'Sans restriction');

    layer.bindTooltip(`
      <b>${escHtml(nom)}</b>${dep ? ' ('+escHtml(dep)+')' : ''}
      ${typeLabel ? '<br><span style="opacity:.7">'+typeLabel+'</span>' : ''}
      <br><span style="color:${col};font-weight:600">${lbl}</span>
    `, { sticky: true, opacity: 1 });

    layer.on('click', () => {
      const el = document.getElementById('dept-detail');
      el.innerHTML = `
        <div class="dept-detail-title">
          <span style="background:${col};width:10px;height:10px;display:inline-block;border-radius:50%;margin-right:6px;flex-shrink:0"></span>
          <strong>${escHtml(nom)}</strong>${dep ? ' — Dép. ' + escHtml(dep) : ''}
          &nbsp;<span style="color:${col}">${lbl}</span>
          ${typeLabel ? `<span style="font-size:10px;color:var(--muted2);margin-left:8px">${typeLabel}</span>` : ''}
        </div>
        ${arrete
          ? `<a href="${escHtml(arrete)}" target="_blank" rel="noopener"
                style="font-size:11px;font-family:var(--mono);color:var(--accent);text-decoration:none;display:inline-block;margin-top:6px">
               📄 Arrêté préfectoral →
             </a>`
          : '<span style="font-size:11px;color:var(--muted);margin-top:6px;display:block">Arrêté non disponible</span>'}`;
      el.classList.add('open');
    });
    layer.on('mouseover', e => e.target.setStyle({ fillOpacity: 0.9, weight: 2 }));
    layer.on('mouseout',  e => geojsonLayer && geojsonLayer.resetStyle(e.target));
  }

  if (geojsonData) {
    if (geojsonLayer) map.removeLayer(geojsonLayer);
    geojsonLayer = L.geoJSON(geojsonData, { style: styleZone, onEachFeature: onEachZone }).addTo(map);
    return;
  }

  showToast('Chargement des zones VigiEau…');
  fetch(VIGIEAU_GJ)
    .then(r => r.json())
    .then(gj => {
      geojsonData = gj;
      if (geojsonLayer) map.removeLayer(geojsonLayer);
      geojsonLayer = L.geoJSON(gj, { style: styleZone, onEachFeature: onEachZone }).addTo(map);
    })
    .catch(e => { showToast('Erreur chargement carte VigiEau'); console.error(e); });

  setTimeout(() => map.invalidateSize(), 50);
}

function showDeptDetail(code, nom, r) {
  const el = document.getElementById('dept-detail');
  if (!r) {
    el.innerHTML = `<div class="dept-detail-title">${nom} (${code}) — Aucune restriction en vigueur</div>`;
  } else {
    const col = NIVEAU_COLOR[r.niveau] || '#aaa';
    el.innerHTML = `
      <div class="dept-detail-title">
        <span class="eau-dot" style="background:${col};width:10px;height:10px;display:inline-block;border-radius:50%"></span>
        ${nom} (${code}) — <span style="color:${col}">${NIVEAU_LABEL[r.niveau] || r.niveau}</span>
      </div>
      ${r.arrete_url
        ? `<a href="${escHtml(r.arrete_url)}" target="_blank" rel="noopener"
              style="font-size:11px;font-family:var(--mono);color:var(--accent);text-decoration:none">
             Voir l'arrêté →
           </a>`
        : '<span style="font-size:11px;color:var(--muted)">Pas d\'arrêté disponible</span>'}`;
  }
  el.classList.add('open');
}

// ─────────────────────────────────────────
// ARCHIVES
// ─────────────────────────────────────────
function renderArchives() {
  const cal = document.getElementById('arc-calendar');
  if (!archive?.dates) {
    cal.innerHTML = '<div class="empty-state">Aucune archive disponible</div>';
    return;
  }

  const availSet = new Set(archive.dates);
  const today    = new Date();
  const start    = new Date(today); start.setDate(start.getDate() - 89);

  // Regrouper par mois
  const months = {};
  for (let d = new Date(start); d <= today; d.setDate(d.getDate() + 1)) {
    const iso   = d.toISOString().slice(0, 10);
    const mkey  = iso.slice(0, 7); // YYYY-MM
    if (!months[mkey]) months[mkey] = [];
    months[mkey].push(iso);
  }

  const MOIS = ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];

  cal.innerHTML = Object.entries(months).reverse().map(([mkey, days]) => {
    const [y, m] = mkey.split('-');
    const label  = `${MOIS[parseInt(m) - 1]} ${y}`;
    const daysHtml = days.map(iso => {
      const dd      = iso.slice(8);
      const hasData = availSet.has(iso);
      const isToday = iso === today.toISOString().slice(0,10);
      const isSel   = iso === currentDate;
      const cls     = ['arc-day', hasData ? 'has-data' : '', isToday ? 'today' : '', isSel ? 'selected' : ''].filter(Boolean).join(' ');
      const onclick = hasData ? `onclick="loadDate('${iso}')"` : '';
      return `<div class="${cls}" ${onclick} title="${iso}">${dd}</div>`;
    }).join('');
    return `<div class="arc-month">
      <div class="arc-month-title">${label}</div>
      <div class="arc-days">${daysHtml}</div>
    </div>`;
  }).join('');
}

async function loadDate(date) {
  if (date === currentDate) return;
  showToast(`Chargement du ${formatDate(date)}…`);
  try {
    D = await loadData(date);
    currentDate = date;
    renderAll();
    if (currentView === 'archives') renderArchives();
  } catch(e) {
    showToast(`Données indisponibles pour ${date}`);
  }
}

// ─────────────────────────────────────────
// VIEW SWITCHING
// ─────────────────────────────────────────
// ─────────────────────────────────────────
// JO / DILA
// ─────────────────────────────────────────
const JO_NATURES = {
  'ARRETE'    : 'Arrêté',
  'DECRET'    : 'Décret',
  'ORDONNANCE': 'Ordonnance',
  'LOI'       : 'Loi',
  'CIRCULAIRE': 'Circulaire',
  'AVIS'      : 'Avis',
  'DECISION'  : 'Décision',
};

function renderJO() {
  const items = D?.jo_autres || [];
  const search = document.getElementById('jo-search')?.value.toLowerCase() || '';
  const groupsEl = document.getElementById('jo-groups');
  if (!groupsEl) return;

  // Stats JO en haut
  const joStatsEl = document.getElementById('jo-stats');
  if (joStatsEl) {
    const nbTotal = D?.stats?.jo_analyses || 0;
    const nbGsf   = D?.stats?.jo_retenus  || 0;
    joStatsEl.innerHTML = `
      <div style="display:flex;gap:16px;margin-bottom:12px;flex-wrap:wrap">
        <div style="display:flex;flex-direction:column;align-items:center;background:var(--surface2);
          border:1px solid var(--border);border-radius:var(--radius);padding:8px 16px">
          <span style="font-family:var(--mono);font-size:20px;font-weight:600;color:var(--text)">${nbTotal}</span>
          <span style="font-family:var(--mono);font-size:9px;color:var(--muted2);text-transform:uppercase;letter-spacing:.1em">textes analysés</span>
        </div>
        <div style="display:flex;flex-direction:column;align-items:center;background:var(--surface2);
          border:1px solid ${nbGsf > 0 ? 'var(--accent)' : 'var(--border)'};border-radius:var(--radius);padding:8px 16px">
          <span style="font-family:var(--mono);font-size:20px;font-weight:600;color:${nbGsf > 0 ? 'var(--accent)' : 'var(--muted)'}">${nbGsf}</span>
          <span style="font-family:var(--mono);font-size:9px;color:var(--muted2);text-transform:uppercase;letter-spacing:.1em">pertinents GSF</span>
        </div>
        <div style="display:flex;flex-direction:column;align-items:center;background:var(--surface2);
          border:1px solid var(--border);border-radius:var(--radius);padding:8px 16px">
          <span style="font-family:var(--mono);font-size:20px;font-weight:600;color:var(--text)">${items.length}</span>
          <span style="font-family:var(--mono);font-size:9px;color:var(--muted2);text-transform:uppercase;letter-spacing:.1em">dans ce JO</span>
        </div>
      </div>`;
  }

  if (!items.length) {
    groupsEl.innerHTML = '<div class="jo-empty">Aucun texte JO pour cette date</div>';
    return;
  }

  // Grouper par nature
  const groups = {};
  items.forEach(item => {
    const nature = (item.nature || 'AUTRE').toUpperCase();
    const label  = JO_NATURES[nature] || nature || 'Autre';
    if (!groups[label]) groups[label] = [];
    const titre = item.titre || '';
    if (!search || titre.toLowerCase().includes(search)) {
      groups[label].push(item);
    }
  });

  const total = Object.values(groups).reduce((s, g) => s + g.length, 0);
  if (!total) {
    groupsEl.innerHTML = '<div class="jo-empty">Aucun résultat pour cette recherche</div>';
    return;
  }

  groupsEl.innerHTML = Object.entries(groups)
    .sort(([a],[b]) => a.localeCompare(b))
    .map(([label, its]) => {
      const rows = its.map(item => `
        <div class="jo-item">
          <div class="jo-item-nature">${escHtml(item.nature || label)}</div>
          <div class="jo-item-titre">${escHtml(item.titre)}</div>
          ${item.url
            ? `<a class="jo-item-link" href="${escHtml(item.url)}" target="_blank" rel="noopener">Légifrance →</a>`
            : '<span style="font-size:10px;color:var(--muted2)">Pas de lien disponible</span>'}
        </div>`).join('');
      return `<div class="jo-theme-group open">
        <div class="jo-theme-header" onclick="this.parentElement.classList.toggle('open')">
          <span class="jo-theme-name">${escHtml(label)}</span>
          <span class="jo-theme-count">${its.length}</span>
          <span class="jo-chevron">▶</span>
        </div>
        <div class="jo-items">${rows}</div>
      </div>`;
    }).join('');
}

function filterJO() { renderJO(); }

function switchView(view) {
  currentView = view;

  document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
  document.getElementById(`${view}-view`).classList.add('active');

  document.querySelectorAll('.nav-item').forEach(el => {
    el.classList.toggle('active', el.dataset.view === view);
  });

  if (view === 'carte') {
    setTimeout(() => {
      renderMap();
      if (map) map.invalidateSize();
    }, 30);
  }
  if (view === 'archives') renderArchives();
  if (view === 'jo') renderJO();
}

// ─────────────────────────────────────────
// UTILS
// ─────────────────────────────────────────
function formatDate(iso) {
  if (!iso) return '—';
  const [y, m, d] = iso.split('-');
  const MOIS = ['jan','fév','mar','avr','mai','jun','jul','aoû','sep','oct','nov','déc'];
  return `${parseInt(d)} ${MOIS[parseInt(m)-1]} ${y}`;
}

function escHtml(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._t);
  t._t = setTimeout(() => t.classList.remove('show'), 2500);
}
