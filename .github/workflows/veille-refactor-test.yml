name: Veille Environnementale GSF (Test Refactor)

on:
  workflow_dispatch:

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --no-cache-dir requests feedparser groq mistralai beautifulsoup4

      - name: Run refactor pipeline
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
        run: |
          python "pipeline (28).py"

      - name: Upload generated artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gsf-pipeline-artifacts-${{ github.sha }}
          if-no-files-found: warn
          path: |
            data/*.json
            archive.json
            vigieau_history.json
            parlement_fiches.json

