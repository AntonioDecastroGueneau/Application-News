name: Veille Environnementale ABC

on:
  schedule:
    - cron: '45 6  * * *'   # 08:45 Paris (UTC+2)
    - cron: '30 11 * * *'   # 13:30 Paris (UTC+2)

  workflow_dispatch:         # déclenchement manuel depuis l'onglet Actions

permissions:
  contents: write            # nécessaire pour le push gh-pages

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── 1. Checkout branche main ──────────────────────────────────
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0     # historique complet pour le push gh-pages

      # ── 2. Python ────────────────────────────────────────────────
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ── 3. Dépendances ───────────────────────────────────────────
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install --no-cache-dir -r requirements.txt

      - name: Install Playwright Chromium
        run: playwright install chromium --with-deps

      # ── 4. Restauration du cache PJL depuis gh-pages ─────────────
      #    pjl_cache.json persiste entre les runs via gh-pages.
      #    Doit être fait AVANT le pipeline pour que le cache soit lisible.
      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages-branch

      - name: Restore pjl_cache from gh-pages
        run: |
          mkdir -p data
          cp gh-pages-branch/data/pjl_cache.json data/pjl_cache.json 2>/dev/null || true

      # ── 5. Exécution du pipeline ─────────────────────────────────
      - name: Run pipeline
        env:
          GROQ_API_KEY:      ${{ secrets.GROQ_API_KEY }}
          MISTRAL_API_KEY:   ${{ secrets.MISTRAL_API_KEY }}
          SUPABASE_URL:      ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: python -m abc_pipeline.main

      # ── 6. Copie des fichiers générés vers gh-pages ──────────────
      - name: Copy generated files to gh-pages
        run: |
          # Créer le dossier data s'il n'existe pas
          mkdir -p gh-pages-branch/data

          # Copier le JSON du jour + le cache PJL
          cp data/*.json gh-pages-branch/data/ 2>/dev/null || true

          # Copier archive.json à la racine de gh-pages
          cp archive.json gh-pages-branch/archive.json

          # Copier l'historique VigiEau (cache annuel)
          cp vigieau_history.json gh-pages-branch/vigieau_history.json 2>/dev/null || true

          # Copier les fiches de suivi parlementaire
          cp parlement_fiches.json gh-pages-branch/parlement_fiches.json 2>/dev/null || true

          # Copier index.html si modifié
          cp index.html gh-pages-branch/index.html

      # ── 7. Commit et push vers gh-pages ──────────────────────────
      - name: Commit and push to gh-pages
        run: |
          cd gh-pages-branch
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          # Commit seulement s'il y a des changements
          git diff --staged --quiet || git commit -m "data: veille $(date -u +%Y-%m-%d)"
          git push origin gh-pages
